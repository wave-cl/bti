  <line x1="16" y1="4" x2="4" y2="26" stroke="#4fc3f7" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="4" y1="26" x2="28" y2="26" stroke="#4fc3f7" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <!-- Nodes -->
