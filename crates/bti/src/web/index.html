<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>bti - BitTorrent Index</title>
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{font-family:system-ui,-apple-system,sans-serif;background:#0a0a0a;color:#e0e0e0;padding:20px;max-width:1024px;margin:0 auto;display:flex;flex-direction:column}
h1{font-size:1.5em;margin-bottom:0;color:#fff}
.topbar{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px}
.topbar-left{display:flex;flex-direction:column;gap:6px}
.topbar .info{font-size:.85em;color:#888;text-align:right}
.topbar .info b{color:#4fc3f7}
.sync-row{display:flex;align-items:center;gap:7px}
.sync-dot{font-size:.75em}
.sync-connected{color:#4caf50}
.sync-connecting{color:#ff9800}
.sync-disconnected{color:#f44336}
.sync-label{font-family:monospace;color:#aaa;font-size:1em}
.sync-tip{position:relative;cursor:default}
.sync-tip:hover::after{content:attr(data-tip);position:absolute;left:0;top:1.4em;background:#222;border:1px solid #444;border-radius:4px;padding:5px 10px;white-space:nowrap;color:#ccc;font-size:.85em;z-index:10;pointer-events:none}
.stats{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:20px}
.stat{background:#1a1a1a;border:1px solid #333;border-radius:6px;padding:10px 14px;font-size:.85em;min-width:110px;text-align:center;cursor:pointer;user-select:none;transition:border-color .15s}
.stat:hover{border-color:#555}
.stat.active{border-color:#4fc3f7}
.stat b{display:block;font-size:1.2em;color:#4fc3f7}
.stat.updated b{animation:pulse .4s ease}
.info.updated b{animation:pulse .4s ease}
@keyframes pulse{0%{color:#8ee5ff}100%{color:#4fc3f7}}
.search-wrap{position:relative;margin-bottom:16px}
.search-wrap input[type=text]{width:100%;padding:10px 44px 10px 14px;background:#1a1a1a;border:1px solid #333;border-radius:6px;color:#fff;font-size:1em;margin-bottom:0}
.search-wrap input:focus{outline:none;border-color:#4fc3f7}
.search-icons{position:absolute;right:10px;top:50%;transform:translateY(-50%);display:flex;gap:2px;align-items:center}
.search-icon{background:none;border:none;color:#555;cursor:pointer;font-size:1em;padding:3px 5px;border-radius:4px;line-height:1}
.search-icon:hover{color:#ccc;background:#2a2a2a}
.logpane{background:#111;border:1px solid #2a2a2a;border-radius:6px;flex:1;overflow-y:scroll;margin-bottom:40px;font-family:monospace;font-size:.78em;min-height:200px}
.logpane .entry{display:flex;gap:10px;padding:4px 12px;border-bottom:1px solid #1a1a1a;align-items:baseline;cursor:pointer}
.logpane .entry:hover{background:#1e1e1e}
.logpane .entry:first-child{background:#1a1a1a}
.logpane .entry:first-child:hover{background:#222}
.logpane .ename{color:#e0e0e0;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.logpane .esize{color:#666;white-space:nowrap}
.logpane .ecat{color:#4fc3f7;white-space:nowrap;min-width:60px}
.logpane .ehash{color:#444;white-space:nowrap}
/* Modal */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;align-items:flex-start;justify-content:center;padding:60px 20px 20px}
.overlay.open{display:flex}
.modal{background:#111;border:1px solid #2a2a2a;border-radius:6px;padding:20px;max-width:640px;width:100%;position:relative;max-height:calc(100vh - 80px);display:flex;flex-direction:column}
.modal h2{font-size:1em;color:#e0e0e0;margin-bottom:16px;padding-right:24px;line-height:1.4;font-weight:600}
.modal .close{position:absolute;top:12px;right:14px;background:none;border:none;color:#444;font-size:1em;cursor:pointer}
.modal .close:hover{color:#aaa}
.modal .row{display:grid;grid-template-columns:90px 1fr;gap:8px;margin-bottom:8px;font-size:.82em;align-items:baseline}
.modal .row .label{color:#555;font-weight:500}
.modal .row .val{color:#aaa;font-family:monospace;word-break:break-all}
.mcat-badge{display:inline-block;background:#1a1a1a;border:1px solid #333;color:#4fc3f7;border-radius:4px;padding:1px 7px;font-size:.78em;font-weight:600;font-family:monospace;letter-spacing:.03em}
.magnet-row{display:flex;gap:8px;margin-top:14px}
.magnet-input{flex:1;background:#0d0d0d;border:1px solid #2a2a2a;border-radius:6px;padding:7px 10px;color:#555;font-family:monospace;font-size:.72em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:default}
.magnet-btn{background:#1a1a1a;border:1px solid #333;border-radius:6px;padding:7px 14px;color:#888;font-size:.82em;font-weight:500;cursor:pointer;white-space:nowrap}
.magnet-btn:hover{border-color:#555;color:#ccc}
.magnet-btn.copied{border-color:#2a5a2a;color:#4caf50}
.files-section{margin-top:16px;overflow:hidden;display:flex;flex-direction:column;flex:1;min-height:0}
.files-heading{font-size:.78em;font-weight:600;color:#555;margin-bottom:6px;letter-spacing:.04em;text-transform:uppercase}
.files-table{overflow-y:auto;border:1px solid #1e1e1e;border-radius:4px;flex:1}
.files-thead{display:grid;grid-template-columns:1fr auto;padding:5px 10px;background:#161616;border-bottom:1px solid #222;font-size:.72em;color:#444;font-weight:600;letter-spacing:.05em;position:sticky;top:0}
.frow{display:grid;grid-template-columns:1fr auto;padding:5px 10px;border-bottom:1px solid #161616;font-size:.75em;font-family:monospace}
.frow:last-child{border-bottom:none}
.frow:hover{background:#161616}
.fname{color:#aaa;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding-right:12px}
.fsize{color:#444;white-space:nowrap;text-align:right}
</style>
</head>
<body>
<div class="topbar"><div class="topbar-left"><img src="/logo.svg" alt="bti" style="height:28px;display:block"><div id="syncinfo"></div></div><div class="info" id="topinfo"></div></div>
<div class="stats" id="stats"></div>
<div class="search-wrap">
  <input type="text" id="q" placeholder="Search torrents..." autofocus>
  <div class="search-icons">
    <button class="search-icon" id="btn-refresh" title="Refresh">&#x21BB;</button>
    <button class="search-icon" id="btn-clear" title="Clear">&#x2715;</button>
  </div>
</div>
<div class="logpane" id="logpane"></div>

<div class="overlay" id="overlay">
  <div class="modal" id="modal">
    <button class="close" id="mclose">✕</button>
    <h2 id="mname"></h2>
    <div class="row"><span class="label">Category</span><span class="val"><span class="mcat-badge" id="mcat"></span></span></div>
    <div class="row"><span class="label">Size</span><span class="val" id="msize"></span></div>
    <div class="row"><span class="label">Infohash</span><span class="val" id="mhash"></span></div>
    <div class="row"><span class="label">Discovered</span><span class="val" id="mdate"></span></div>
    <div class="magnet-row">
      <div class="magnet-input" id="mmagnet-display"></div>
      <button class="magnet-btn" id="mmagnet-btn">Copy Magnet</button>
    </div>
    <div class="files-section" id="mfiles" style="display:none">
      <div class="files-heading">Files</div>
      <div class="files-table">
        <div class="files-thead"><span>PATH</span><span>SIZE</span></div>
        <div id="mfiles-body"></div>
      </div>
    </div>
  </div>
</div>

<script>
const $=s=>document.querySelector(s);
const fmt=n=>{if(n>=1e12)return(n/1e12).toFixed(1)+'TB';if(n>=1e9)return(n/1e9).toFixed(1)+'GB';if(n>=1e6)return(n/1e6).toFixed(1)+'MB';if(n>=1e3)return(n/1e3).toFixed(1)+'KB';return n+'B'};
const order=['movie','tv','anime','music','game','software','book','audiobook','course','xxx','other'];
const PAGE=50;
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function timeAgo(ts){const s=Math.floor(Date.now()/1000)-ts;if(s<60)return s+'s ago';if(s<3600)return Math.floor(s/60)+'m ago';if(s<86400)return Math.floor(s/3600)+'h ago';return Math.floor(s/86400)+'d ago'}

let prev={};
let activeCat=null;
let logPaused=false;
let offset=0;
let hasMore=true;
let loading=false;
let isSearch=false;
const shownHashes=new Set();

function entryHtml(r){
  return `<div class="entry" data-ih="${r.infohash}" data-name="${esc(r.name)}" data-size="${r.size}" data-cat="${r.category}" data-ts="${r.discovered_at}" data-files='${JSON.stringify(r.files||[])}'><span class="ecat">${r.category}</span><span class="ename">${esc(r.name)}</span><span class="esize">${fmt(r.size)}</span><span class="ehash">${timeAgo(r.discovered_at)}</span></div>`;
}

function makeEntry(r){
  const el=document.createElement('div');
  el.className='entry';
  el.dataset.ih=r.infohash;el.dataset.name=r.name;el.dataset.size=r.size;
  el.dataset.cat=r.category;el.dataset.ts=r.discovered_at;
  el.dataset.files=JSON.stringify(r.files||[]);
  el.innerHTML=`<span class="ecat">${r.category}</span><span class="ename">${esc(r.name)}</span><span class="esize">${fmt(r.size)}</span><span class="ehash">${timeAgo(r.discovered_at)}</span>`;
  el.onclick=()=>openModal(el.dataset);
  return el;
}

function appendEntries(entries){
  const lp=$('#logpane');
  const frag=document.createDocumentFragment();
  entries.forEach(r=>{
    if(shownHashes.has(r.infohash))return;
    shownHashes.add(r.infohash);
    frag.appendChild(makeEntry(r));
  });
  lp.appendChild(frag);
  if(entries.length<PAGE)hasMore=false;
}

function prependNewEntries(entries){
  const lp=$('#logpane');
  const newOnes=entries.filter(r=>!shownHashes.has(r.infohash));
  if(!newOnes.length)return;
  const frag=document.createDocumentFragment();
  newOnes.forEach(r=>{shownHashes.add(r.infohash);frag.appendChild(makeEntry(r));});
  lp.insertBefore(frag,lp.firstChild);
  offset+=newOnes.length;
}

function clearLog(){$('#logpane').innerHTML='';shownHashes.clear();offset=0;hasMore=true;}

// Category filter
function setCat(cat){
  activeCat=cat;
  renderStats(lastStats);
  refresh();
}

let lastStats=null;
function renderStats(d){
  if(!d)return;
  lastStats=d;
  let h=`<div class="stat${activeCat===null?' active':''}" data-cat=""><b>${d.total.toLocaleString()}</b>all</div>`;
  for(const k of order){const v=d.categories?.[k];if(v>0){
    const ch=prev[k]!==v;
    h+=`<div class="stat${ch?' updated':''}${activeCat===k?' active':''}" data-cat="${k}"><b>${v.toLocaleString()}</b>${k}</div>`;
  }}
  $('#stats').innerHTML=h;
  document.querySelectorAll('.stat').forEach(el=>{
    el.onclick=()=>setCat(el.dataset.cat||null);
  });
}

function refreshStats(){
  fetch('/api/stats').then(r=>r.json()).then(d=>{
    const ti=$('#topinfo');
    const changed=prev.total!==d.total||prev.db_size!==d.db_size;
    ti.innerHTML=`<b>${d.total.toLocaleString()}</b> torrents &middot; <b>${fmt(d.db_size)}</b> database`;
    if(d.sync){
      let tooltip='';
      if(d.sync.crawler_total>0)tooltip=`${d.sync.crawler_total.toLocaleString()} torrents · ${fmt(d.sync.crawler_db_size)} db · ${fmt(d.sync.crawler_mem_rss)} mem · ${fmt(d.sync.crawler_disk_used)}/${fmt(d.sync.crawler_disk_total)} disk`;
      $('#syncinfo').innerHTML=`<div class="sync-row"><span class="sync-dot sync-${d.sync.state}">⬤</span><span class="sync-label sync-tip" data-tip="${tooltip}">sqc://${d.sync.label}</span></div>`;
    }
    if(changed){ti.classList.remove('updated');void ti.offsetWidth;ti.classList.add('updated')}
    renderStats(d);
    prev={total:d.total,db_size:d.db_size,...d.categories};
  }).catch(()=>{});
}

function refreshRecent(reset){
  if(logPaused)return;
  isSearch=false;
  if(reset){clearLog();}
  if(reset||shownHashes.size===0){loadMoreRecent();return;}
  // Auto-refresh: fetch first page and prepend only new entries (no flash)
  const url='/api/recent?offset=0'+(activeCat?'&category='+activeCat:'');
  fetch(url).then(r=>r.json()).then(d=>{
    if(isSearch)return;
    prependNewEntries(d);
  }).catch(()=>{});
}

function loadMoreRecent(){
  if(loading||!hasMore)return;
  loading=true;
  let url='/api/recent?offset='+offset+(activeCat?'&category='+activeCat:'');
  fetch(url).then(r=>r.json()).then(d=>{
    if(isSearch){loading=false;return;}
    appendEntries(d);
    offset+=d.length;
    loading=false;
  }).catch(()=>{loading=false;});
}

function doSearch(reset){
  const q=$('#q').value.trim();
  if(!q){refreshRecent();return;}
  if(reset){clearLog();isSearch=true;}
  if(loading||!hasMore)return;
  loading=true;
  const url='/api/search?q='+encodeURIComponent(q)+'&limit='+PAGE+'&offset='+offset+(activeCat?'&category='+activeCat:'');
  fetch(url).then(r=>r.json()).then(d=>{
    appendEntries(d);
    offset+=d.length;
    loading=false;
  }).catch(()=>{loading=false;});
}

function refresh(){
  const q=$('#q').value.trim();
  if(q) doSearch(true); else refreshRecent(true);
}

// Infinite scroll
const logpane=$('#logpane');
logpane.addEventListener('scroll',()=>{
  if(logpane.scrollTop+logpane.clientHeight>=logpane.scrollHeight-120&&!loading&&hasMore){
    if(isSearch) doSearch(false); else loadMoreRecent();
  }
});
logpane.addEventListener('mouseenter',()=>logPaused=true);
logpane.addEventListener('mouseleave',()=>logPaused=false);

$('#btn-refresh').onclick=()=>refresh();
$('#btn-clear').onclick=()=>{$('#q').value='';refreshRecent(true);$('#q').focus()};

let t;$('#q').oninput=()=>{clearTimeout(t);t=setTimeout(()=>doSearch(true),300)};

// Modal
function openModal(data){
  $('#mname').textContent=data.name;
  $('#mcat').textContent=data.cat;
  $('#msize').textContent=fmt(parseInt(data.size));
  $('#mhash').textContent=data.ih;
  $('#mdate').textContent=new Date(parseInt(data.ts)*1000).toLocaleString();
  const magnet=`magnet:?xt=urn:btih:${data.ih}&dn=${encodeURIComponent(data.name)}`;
  $('#mmagnet-display').textContent=magnet;
  const mb=$('#mmagnet-btn');
  mb.textContent='Copy Magnet';
  mb.className='magnet-btn';
  mb.onclick=()=>{navigator.clipboard.writeText(magnet).then(()=>{mb.textContent='Copied!';mb.classList.add('copied');setTimeout(()=>{mb.textContent='Copy Magnet';mb.classList.remove('copied')},1500)})};
  let files=[];
  try{files=JSON.parse(data.files||'[]')}catch(e){}
  const mf=$('#mfiles');
  if(files.length>0){
    mf.style.display='';
    $('#mfiles-body').innerHTML=files.map(f=>`<div class="frow"><span class="fname">${esc(f.path)}</span><span class="fsize">${fmt(f.size)}</span></div>`).join('');
  }else{mf.style.display='none'}
  $('#overlay').classList.add('open');
}
$('#mclose').onclick=()=>$('#overlay').classList.remove('open');
$('#overlay').onclick=e=>{if(e.target===$('#overlay'))$('#overlay').classList.remove('open')};
document.addEventListener('keydown',e=>{if(e.key==='Escape')$('#overlay').classList.remove('open')});

refreshStats();
refreshRecent();
setInterval(refreshStats,5000);
setInterval(()=>{if(!$('#q').value.trim()&&!logPaused)refreshRecent(false)},5000);
</script>
</body>
</html>
